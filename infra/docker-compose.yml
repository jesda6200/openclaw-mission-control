version: '3.8'
services:
  backend:
    build: ../backend
    command: npm run start
    ports:
      - "4000:3000"
    environment:
      PORT: 3000
      DB_CLIENT: sqlite
      SQLITE_FILE: /app/data/app.sqlite
      CORS_ORIGIN: http://localhost:3000
      JWT_ACCESS_SECRET: change-me-access-secret-min-32-characters
      JWT_REFRESH_SECRET: change-me-refresh-secret-min-32-characters
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:3000
    depends_on:
      - backend

volumes:
  backend_data:
